lint.select = ["E", "F", "W", "T20", "ARG", "ERA", "PL", "N", "FIX", "I001", "SLF"]
line-length = 100
lint.ignore = ["N818", "PLR2004", "PLW2901"]
exclude = []
fix = true

[lint.per-file-ignores]
"tests/*" = ["SLF001"]

[lint.pylint]
max-args = 15
max-statements = 100
max-branches = 20
max-returns = 10
